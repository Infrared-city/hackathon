name: Deploy Windmill Scripts

on:
  push:
    branches: [main]
    paths:
      - 'windmill/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy hackathon scripts to ir-main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g windmill-cli

      - name: Deploy
        working-directory: windmill
        env:
          WMILL_TOKEN: ${{ secrets.WINDMILL_IR_TOKEN }}
        run: |
          wmill workspace add ir-main ir-main https://windmill.team.infrared.city --token $WMILL_TOKEN
          wmill workspace switch ir-main
          wmill sync push --yes
