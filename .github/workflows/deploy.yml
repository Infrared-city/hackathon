name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_WINDMILL_TRIGGER_TOKEN:  ${{ secrets.VITE_WINDMILL_TRIGGER_TOKEN }}
          VITE_NOCODB_READ_TOKEN:       ${{ secrets.VITE_NOCODB_READ_TOKEN }}
          VITE_NOCO_PARTICIPANTS_TABLE: ${{ vars.VITE_NOCO_PARTICIPANTS_TABLE }}
          VITE_NOCO_SUBMISSIONS_TABLE:  ${{ vars.VITE_NOCO_SUBMISSIONS_TABLE }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name hackathon --commit-dirty=true
