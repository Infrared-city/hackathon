summary: Hackathon — update participant canvas profile
description: |
  Updates an existing participant's canvas fields (skills, looking_for_team,
  project_idea). Initial registration happens in `request_key`; this script
  is for later profile edits.
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  properties:
    nickname:
      type: string
      description: Display name used as lookup key
    skills:
      type: array
      items: { type: string }
    looking_for_team:
      type: boolean
      default: true
    project_idea:
      type: string
      default: ""
  required:
    - nickname
    - skills
